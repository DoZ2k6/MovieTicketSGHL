<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Xác nhận đặt vé - MovieTicketSGHL</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 14px; box-shadow: 0 2px 16px #0001; padding: 32px 24px; }
    h2 { color: #e50914; text-align: center; }
    .ticket-card { display: flex; align-items: center; background: #fafafa; border-radius: 10px; box-shadow: 0 2px 8px #0001; margin-bottom: 24px; padding: 18px 20px; gap: 24px; }
    .ticket-card img { width: 110px; border-radius: 8px; box-shadow: 0 2px 8px #0002; }
    .ticket-info { flex: 1; }
    .ticket-info h3 { margin: 0 0 8px 0; color: #222; }
    .ticket-info p { margin: 4px 0; color: #444; }
    .no-ticket { text-align: center; color: #888; margin: 48px 0; font-size: 1.2rem; }
    .btn-view-all { display: block; margin: 0 auto; background: #e50914; color: #fff; border: none; border-radius: 8px; padding: 12px 32px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>✅ Đặt vé thành công!</h2>
    <div id="ticketList"></div>
    <button class="btn-view-all" onclick="window.location.href='comfirm.html'">Xem tất cả vé đã đặt</button>
  </div>
  <script>
    // Lấy danh sách vé từ localStorage
    let tickets = JSON.parse(localStorage.getItem('tickets') || "[]");
    const ticketList = document.getElementById('ticketList');
    if (!tickets.length) {
      ticketList.innerHTML = '<div class="no-ticket">Bạn chưa đặt vé nào.</div>';
    } else {
      // Hiển thị vé mới nhất (vé vừa đặt)
      const ticket = tickets[tickets.length - 1];
      ticketList.innerHTML = `
        <div class="ticket-card">
          <img src="${ticket.img}" alt="${ticket.movie}">
          <div class="ticket-info">
            <h3>${ticket.movie}</h3>
            <p><strong>Rạp:</strong> ${ticket.cinema}</p>
            <p><strong>Suất chiếu:</strong> ${ticket.time}</p>
            <p><strong>Ghế:</strong> ${ticket.seat}</p>
            <p><strong>Mã vé:</strong> <span style="color:#e50914">${ticket.code}</span></p>
          </div>
        </div>
      `;
    }
    // Nút xem tất cả vé đã đặt sẽ chuyển sang chính trang này (hoặc bạn có thể tạo trang tickets.html để xem tất cả vé)
    document.querySelector('.btn-view-all').onclick = function() {
      window.location.href = 'comfirm.html';
    }
  </script>
</body>
</html>
