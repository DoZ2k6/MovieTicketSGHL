<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Liên hệ - MovieTicketSGHL</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      min-height: 100vh;
      background-color: #000;
      color: #fff;
    }

    .contact-left {
      width: 50%;
      max-height: 100vh; 
      position: relative;
      overflow: hidden;
    }
    .contact-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .contact-right {
      flex: 1;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .contact-box {
      width: 100%;
      max-width: 450px;
    }

    .contact-box h2 {
      color: #e50914;
      margin-bottom: 10px;
    }

    .contact-box p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .contact-box input,
    .contact-box textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      background: #222;
      color: #fff;
    }

    .contact-box textarea {
      resize: vertical;
      min-height: 100px;
    }

    .btn-send {
      background: #e50914;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    .btn-send:hover {
      background: #e50914;
    }

    .back-home {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #bbb;
    }

    .back-home a {
      color: #e50914;
      text-decoration: none;
    }

    .back-home a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="contact-left">
    <img src="image/cinema.jpg" alt="Rạp phim" class="contact-image">
  </div>

  <div class="contact-right">
    <form class="contact-box" onsubmit="return sendContact()">
      <h2>Liên hệ với MovieTicketSGHL</h2>
      <p>Góp ý, câu hỏi hoặc báo lỗi? Hãy gửi ngay cho chúng mình 💬</p>

      <input type="text" id="name" placeholder="Họ và tên" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="subject" placeholder="Chủ đề" required>
      <textarea id="message" placeholder="Nội dung liên hệ..." required></textarea>

      <button type="submit" class="btn-send">Gửi liên hệ</button>

      <div class="back-home">
        <a href="movies.html">⬅ Quay về trang chủ</a>
      </div>
    </form>
  </div>

<script>
  function sendContact() {
    alert("✅ Cảm ơn bạn đã liên hệ! Chúng tôi sẽ phản hồi sớm nhất.");
    // Ở đây bạn có thể kết nối API gửi form thực nếu muốn
    return false; // Ngăn reload trang
  }
</script>

</body>
</html>
