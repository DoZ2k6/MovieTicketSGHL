<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thanh toán vé xem phim</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px #0001;
      padding: 32px 24px;
    }
    h2 { color: #e50914; text-align: center; }
    .info { margin-bottom: 24px; }
    .info p { margin: 8px 0; }
    .pay-method { margin-bottom: 24px; }
    .pay-method label { margin-right: 18px; }
    .btn-pay {
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      display: block;
      margin: 0 auto;
    }
    .btn-pay:hover { background: #b1060f; }
    .success { color: #00b800; text-align: center; font-size: 1.2rem; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Thanh toán vé xem phim</h2>
    <div class="info" id="ticketInfo"></div>
    <form id="paymentForm">
      <div class="pay-method">
        <strong>Chọn phương thức thanh toán:</strong><br>
        <label><input type="radio" name="method" value="momo" checked> Ví MoMo</label>
        <label><input type="radio" name="method" value="bank"> Chuyển khoản ngân hàng</label>
        <label><input type="radio" name="method" value="cash"> Thanh toán tại quầy</label>
      </div>
      <button type="submit" class="btn-pay">Thanh toán</button>
    </form>
    <div class="success" id="successMsg" style="display:none;">
      ✅ Thanh toán thành công! Vé của bạn đã được lưu.<br>
      <a href="tickets.html" style="color:#e50914;text-decoration:underline;">Xem vé đã đặt</a>
    </div>
  </div>
  <script>
    // Lấy vé mới nhất từ localStorage
    let tickets = JSON.parse(localStorage.getItem('tickets') || "[]");
    const ticket = tickets.length ? tickets[tickets.length - 1] : null;
    const ticketInfo = document.getElementById('ticketInfo');
    if (ticket) {
      ticketInfo.innerHTML = `
        <p><strong>Phim:</strong> ${ticket.movie}</p>
        <p><strong>Rạp:</strong> ${ticket.cinema}</p>
        <p><strong>Suất chiếu:</strong> ${ticket.time}</p>
        <p><strong>Ghế:</strong> ${ticket.seat}</p>
        <p><strong>Mã vé:</strong> <span style="color:#e50914">${ticket.code}</span></p>
        <p><strong>Giá vé:</strong> 100.000đ/vé</p>
      `;
    } else {
      ticketInfo.innerHTML = "<p style='color:#e50914;'>Không tìm thấy thông tin vé!</p>";
      document.querySelector('.btn-pay').disabled = true;
    }

    document.getElementById('paymentForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('successMsg').style.display = 'block';

      // Sau khi thanh toán thành công:
      let tickets = JSON.parse(localStorage.getItem('tickets') || "[]");
      if (tickets.length) {
        tickets[tickets.length - 1].paid = true; // Đánh dấu vé mới nhất đã thanh toán
        localStorage.setItem('tickets', JSON.stringify(tickets));
      }
    };
  </script>
</body>
</html>
