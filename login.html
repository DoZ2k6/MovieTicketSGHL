<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      min-height: 100vh;
    }

    .login-left {
      width: 50%;
      max-height: 100vh; 
      position: relative;
      overflow: hidden;
    }

    .login-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      }
      
    .login-right {
      flex: 1;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
    }

    .login-box h2 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #e50914;
    }

    .login-box p {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    .login-box input[type="email"],
    .login-box input[type="password"] {
      background: #222;
      color: #fff;
    }

    .btn-login {
      background-color: #e50914;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 14px;
      margin-top: 10px;
      border-radius: 6px;
      width: 100%;
    }

    .btn-login:hover {
      background-color: #b1060f;
    }

    .login-box .forgot {
      display: block;
      text-align: right;
      font-size: 13px;
      margin-top: 8px;
      color: #aaa;
      text-decoration: none;
    }

    .login-box .forgot:hover {
      color: #fff;
      text-decoration: underline;
    }

    .login-box .register-prompt {
      margin-top: 20px;
      font-size: 14px;
      color: #bbb;
    }

    .login-box .register-prompt a {
      color: #e50914;
      text-decoration: none;
    }

    .login-box .register-prompt a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>
  

  <div class="login-left">
    <img src="image/cinema.jpg" alt="Rạp phim" class="login-image">
  </div>

  <div class="login-right">
    <form class="login-box">
      <h2>Đăng nhập</h2>
      <p>Đăng nhập để tiếp tục khám phá phim hay 🎬</p>

      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Mật khẩu" required>

      <button type="submit" class="btn-login">Đăng nhập</button>

      <a href="forgot.html" class="forgot">Quên mật khẩu?</a>

      <div class="register-prompt">
        Nếu bạn chưa có tài khoản, <a href="register.html">đăng ký ngay</a>
      </div>
    </form>
  </div>

  <script>
    document.querySelector('.login-box').addEventListener('submit', function (e) {
      e.preventDefault();

      const email = document.querySelector('input[type="email"]').value.trim();
      const password = document.querySelector('input[type="password"]').value;

      // Lấy thông tin tài khoản từ localStorage
      const userData = localStorage.getItem('user_' + email);
      if (userData) {
        const user = JSON.parse(userData);
        if (user.password === password) {
          // Đăng nhập thành công
          localStorage.setItem('current_user', email);
          window.location.href = "movies.html";
          return;
        }
      }
      alert("❌ Sai tài khoản hoặc mật khẩu!");
    });
  </script>
</body>
</html>
