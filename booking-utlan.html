<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt vé - Út Lan: Oán Linh Giữ Của</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: black;
    }
    header {
      background-color: black;
      color: #fff;
      padding: 15px;
    }
    .booking-container {
      max-width: 800px;
      margin: 20px auto;
      padding: 30px;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
    .movie-info-booking h2 {
      margin-top: 0;
      color: #e50914;
    }
    .showtime-select,
    .seat-select {
      margin: 25px 0;
    }
    .showtime-select select {
      padding: 8px 15px;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }
    .seat {
      width: 40px;
      height: 40px;
      background: #f0f0f0;
      border-radius: 4px;
      text-align: center;
      line-height: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }
    .seat:hover {
      background: #ddd;
      transform: scale(1.05);
    }
    .seat.selected {
      background-color: #e50914;
      color: #fff;
    }
    .seat.occupied {
      background-color: #777;
      color: #fff;
      cursor: not-allowed;
    }
    .screen {
      text-align: center;
      margin: 20px 0;
      padding: 10px;
      background: #222;
      color: white;
      font-weight: bold;
      border-radius: 4px;
    }
    .btn-submit {
      background: #e50914;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s;
      display: block;
      width: 100%;
    }
    .btn-submit:hover {
      background: #b1060f;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .seat-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header style="background:#222; color:#fff; padding:15px 0;">
  <div style="display:flex; align-items:center; max-width:1200px; margin:auto;">
    <a href="index.html" style="display:flex; align-items:center;">
      <img src="image/logo SGHL.jpg" alt="SGHL Logo" style="height:80px; margin-right:28px;">
    </a>
  </div>
</header>

<div class="booking-container">
  <div class="movie-info-booking">
    <h2>Út Lan: Oán Linh Giữ Của</h2>
    <p><strong>Thể loại:</strong>Kinh Dị</p>
    <p><strong>Thời lượng:</strong> 111 phút </p>
    <p><strong>Ngày chiếu:</strong> 07/07/2025</p>
  </div>

  <div class="showtime-select">
    <label for="showtime"><strong>Chọn suất chiếu:</strong></label>
    <select id="showtime">
      <option>10:00 AM</option>
      <option>13:00 PM</option>
      <option>16:00 PM</option>
      <option>19:00 PM</option>
      <option>21:00 PM</option>
    </select>
  </div>

  <div class="seat-select">
    <strong>Chọn ghế:</strong>
    <div class="screen">MÀN HÌNH</div>
    <div class="seat-grid" id="seatGrid">
      <!-- Seats will be generated by JavaScript -->
    </div>
    <div class="seat-legend">
      <div class="legend-item">
        <div class="legend-color" style="background:#f0f0f0;"></div>
        <span>Có sẵn</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#e50914;"></div>
        <span>Đã chọn</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background:#777;"></div>
        <span>Đã đặt</span>
      </div>
    </div>
  </div>

  <button class="btn-submit" onclick="confirmBooking()">XÁC NHẬN ĐẶT VÉ</button>
</div>

<script>
  // Generate seats with some random occupied seats
  const grid = document.getElementById('seatGrid');
  const totalSeats = 40;
  const occupiedSeats = new Set();
  
  // Randomly occupy some seats (20% chance)
  for (let i = 1; i <= totalSeats; i++) {
    if (Math.random() < 0.2) {
      occupiedSeats.add(i);
    }
  }

  for (let i = 1; i <= totalSeats; i++) {
    const seat = document.createElement('div');
    seat.classList.add('seat');
    if (occupiedSeats.has(i)) {
      seat.classList.add('occupied');
    }
    seat.textContent = i;
    seat.onclick = function() {
      if (!this.classList.contains('occupied')) {
        this.classList.toggle('selected');
      }
    };
    grid.appendChild(seat);
  }

  function confirmBooking() {
    const seats = Array.from(document.querySelectorAll('.seat.selected')).map(el => el.textContent);
    const time = document.getElementById('showtime').value;
    const movie = "Út Lan: Oán Linh Giữ Của";
    const cinema = "Cinema SGHL";
    
    if (seats.length === 0) {
      alert("❌ Vui lòng chọn ít nhất một ghế ngồi.");
      return;
    }

    // Create new ticket
    const newTicket = {
      movie,
      img: "image/bannerutlan.jpg",
      cinema,
      time,
      seat: "Ghế " + seats.join(', '),
      code: "SGHL" + Math.floor(Math.random()*1000000),
      paid: false
    };

    // Get existing tickets
    let tickets = JSON.parse(localStorage.getItem('tickets') || "[]");
    tickets.push(newTicket);
    localStorage.setItem('tickets', JSON.stringify(tickets));
    
    // Redirect to payment page
    window.location.href = 'payment.html';
  }
</script>

</body>
</html>
