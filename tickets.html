<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Vé đã đặt - MovieTicketSGHL</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .container { max-width: 900px; margin: 40px auto 0 auto; background: #fff; border-radius: 14px; box-shadow: 0 2px 16px #0001; padding: 32px 24px; }
    h2 { color: #e50914; text-align: center; }
    .ticket-list { margin-top: 32px; }
    .ticket-card { display: flex; align-items: center; background: #fafafa; border-radius: 10px; box-shadow: 0 2px 8px #0001; margin-bottom: 24px; padding: 18px 20px; gap: 24px; position: relative; }
    .ticket-card img { width: 110px; border-radius: 8px; box-shadow: 0 2px 8px #0002; }
    .ticket-info { flex: 1; }
    .ticket-info h3 { margin: 0 0 8px 0; color: #222; }
    .ticket-info p { margin: 4px 0; color: #444; }
    .no-ticket { text-align: center; color: #888; margin: 48px 0; font-size: 1.2rem; }
    .close-container { 
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 15px;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #e50914;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .close-btn:hover {
      color: #b1060f;
      transform: scale(1.1);
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1rem;
      color: #ff4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 4px;
    }
    .delete-btn:hover {
      background: #ffeeee;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 400px;
      text-align: center;
    }
    .modal-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .modal-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .confirm-btn {
      background: #e50914;
      color: white;
    }
    .cancel-btn {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="close-container">
      <button id="deleteOldTickets" class="delete-btn" title="Xóa vé cũ">
        <span>Xóa vé cũ</span>
      </button>
      <button id="closeTickets" class="close-btn" title="Đóng">
        ×
      </button>
    </div>
    <h2>🎟️ Vé đã đặt của bạn</h2>
    <div class="ticket-list" id="ticketList"></div>
    <div class="no-ticket" id="noTicket" style="display:none;">
      Bạn chưa đặt vé nào.
    </div>
  </div>

  <!-- Modal xác nhận -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3>Xác nhận xóa vé cũ</h3>
      <p>Bạn có chắc muốn xóa tất cả vé đã đặt trước đây?</p>
      <div class="modal-buttons">
        <button id="confirmDelete" class="modal-btn confirm-btn">Xóa</button>
        <button id="cancelDelete" class="modal-btn cancel-btn">Hủy</button>
      </div>
    </div>
  </div>

  <script>
    // Lấy danh sách vé từ localStorage
    let tickets = JSON.parse(localStorage.getItem('tickets') || "[]");
    // Lọc chỉ lấy vé đã thanh toán
    tickets = tickets.filter(ticket => ticket.paid);
    const ticketList = document.getElementById('ticketList');
    const noTicket = document.getElementById('noTicket');
    
    // Hiển thị vé
    function displayTickets() {
      ticketList.innerHTML = '';
      if (tickets.length === 0) {
        noTicket.style.display = 'block';
      } else {
        noTicket.style.display = 'none';
        tickets.forEach(ticket => {
          const div = document.createElement('div');
          div.className = 'ticket-card';
          div.innerHTML = `
            <img src="${ticket.img}" alt="${ticket.movie}">
            <div class="ticket-info">
              <h3>${ticket.movie}</h3>
              <p><strong>Rạp:</strong> ${ticket.cinema}</p>
              <p><strong>Suất chiếu:</strong> ${ticket.time}</p>
              <p><strong>Ghế:</strong> ${ticket.seat}</p>
              <p><strong>Mã vé:</strong> <span style="color:#e50914">${ticket.code}</span></p>
            </div>
          `;
          ticketList.appendChild(div);
        });
      }
    }
    
    displayTickets();
    
    // Xử lý nút đóng (nút X)
    document.getElementById('closeTickets').onclick = function() {
      window.location.href = 'movies.html';
    };
    
    // Xử lý nút xóa vé cũ
    const deleteBtn = document.getElementById('deleteOldTickets');
    const modal = document.getElementById('confirmModal');
    const confirmDelete = document.getElementById('confirmDelete');
    const cancelDelete = document.getElementById('cancelDelete');
    
    deleteBtn.onclick = function() {
      modal.style.display = 'flex';
    };
    
    cancelDelete.onclick = function() {
      modal.style.display = 'none';
    };
    
    confirmDelete.onclick = function() {
      // Xóa tất cả vé trong localStorage
      localStorage.removeItem('tickets');
      tickets = [];
      displayTickets();
      modal.style.display = 'none';
      alert('Đã xóa tất cả vé cũ thành công!');
    };
  </script>
</body>
</html>
